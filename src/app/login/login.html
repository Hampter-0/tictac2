<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <form (ngSubmit)="onSubmit($event)" class="account-form">
        <input type="text" placeholder="username" [(ngModel)]="username" name="username">
        <input type="password" placeholder="password" [(ngModel)]="password" name="password">
        <button type="submit"> Login </button>
    </form>
    <p class="credits">made by hampternom</p>

</body>

</html>
