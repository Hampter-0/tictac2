<div class="field">
  <div class="top-left" (click)="handleClick(0)">{{ board[0] }}</div>
  <div class="top-middle" (click)="handleClick(1)">{{ board[1] }}</div>
  <div class="top-right" (click)="handleClick(2)">{{ board[2] }}</div>
  <div class="middle-left" (click)="handleClick(3)">{{ board[3] }}</div>
  <div class="middle" (click)="handleClick(4)">{{ board[4] }}</div>
  <div class="middle-right" (click)="handleClick(5)">{{ board[5] }}</div>
  <div class="bottom-left" (click)="handleClick(6)">{{ board[6] }}</div>
  <div class="bottom-middle" (click)="handleClick(7)">{{ board[7] }}</div>
  <div class="bottom-right" (click)="handleClick(8)">{{ board[8] }}</div>
</div>

<p class="win-text">{{ winText }}</p>
<button class="btn" (click)="resetBoard()"> reset board </button>
