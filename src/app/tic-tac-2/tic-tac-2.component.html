<nav class="nav">
    <button class="btn"  routerLink="/account" > Account </button>
    <button class="btn"> GameModes </button>
    <button class="btn"> Leaderboard </button>
    <button class="btn" routerLink="/rules"> Rules </button>
  </nav>

<div class="page-layout">
  <div class="main-content">
    <div class="field">
      <div (click)="handleClick(0)">{{ board[0] }}</div>
      <div (click)="handleClick(1)">{{ board[1] }}</div>
      <div (click)="handleClick(2)">{{ board[2] }}</div>
      <div (click)="handleClick(3)">{{ board[3] }}</div>
      <div (click)="handleClick(4)">{{ board[4] }}</div>
      <div (click)="handleClick(5)">{{ board[5] }}</div>
      <div (click)="handleClick(6)">{{ board[6] }}</div>
      <div (click)="handleClick(7)">{{ board[7] }}</div>
      <div (click)="handleClick(8)">{{ board[8] }}</div>
    </div>

    <p class="win-text">{{ winText }}</p>

    <div class="options-btn">
      <button class="btn" (click)="resetBoard()"> reset board </button>
      <button class="btn" routerLink="/supertictac2"> Supertictac2 </button>
    </div>
  </div>

  <div class="chat">
  <div class="chat-messages">
    <div class="message">hampternom: XD</div>
    <div class="message">nom: XD</div>
  </div>

  <div class="chat-input">
    <input class="input-box" type="text" placeholder="..." />
    <button class="btn"> ></button>
  </div>
</div>
</div>
